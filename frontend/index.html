<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalon — God View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep:    #0d0d0f;
    --bg-card:    #141418;
    --bg-raised:  #1a1a20;
    --border:     #2a2a35;
    --border-lit: #3d3d50;
    --gold:       #c9a84c;
    --gold-dim:   #7a6230;
    --good:       #4a8c6f;
    --good-dim:   #2a4f3f;
    --evil:       #8c3a3a;
    --evil-dim:   #4f2020;
    --merlin:     #5a6eb0;
    --merlin-dim: #2f3a6f;
    --text-pri:   #e8e4d8;
    --text-sec:   #9a9080;
    --text-dim:   #4a4840;
    --pending:    #3a3a48;
  }

  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--text-pri);
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 16px;
    line-height: 1.5;
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 280px 1fr 340px;
    grid-template-areas:
      "header header header"
      "players feed reasoning"
      "players continue reasoning";
    height: 100vh;
  }

  header {
    grid-area: header;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    background: var(--bg-card);
  }

  .title {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .title span {
    color: var(--text-dim);
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0.2em;
    margin-left: 16px;
  }

  .quest-track { display: flex; gap: 8px; align-items: center; }

  .quest-pip {
    width: 38px; height: 38px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--pending);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 13px; font-weight: 600;
    color: var(--text-dim);
    transition: all 0.4s ease;
  }

  .quest-pip.pass   { background: var(--good-dim); border-color: var(--good); color: var(--good); }
  .quest-pip.fail   { background: var(--evil-dim); border-color: var(--evil); color: var(--evil); }
  .quest-pip.active { border-color: var(--gold-dim); color: var(--gold); box-shadow: 0 0 12px rgba(201,168,76,0.15); }

  .score-display { display: flex; gap: 16px; align-items: center; font-family: 'Cinzel', serif; font-size: 13px; }
  .score-good { color: var(--good); }
  .score-evil { color: var(--evil); }
  .score-sep  { color: var(--text-dim); }

  .status-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; padding: 3px 8px;
    border-radius: 2px;
    border: 1px solid var(--border-lit);
    color: var(--text-sec);
    background: var(--bg-raised);
    letter-spacing: 0.1em;
  }

  .status-badge.live { border-color: var(--good); color: var(--good); animation: pulse-badge 2s ease-in-out infinite; }
  @keyframes pulse-badge { 0%,100%{opacity:1}50%{opacity:0.5} }

  .continue-bar {
    grid-area: continue;
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    background: var(--bg-card);
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }

  .continue-btn {
    font-family: 'Cinzel', serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--bg-deep);
    background: var(--gold);
    border: none; border-radius: 3px;
    padding: 8px 24px;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.2s;
    width: 100%;
  }

  .continue-btn:hover   { opacity: 0.85; }
  .continue-btn:disabled { background: var(--border); color: var(--text-dim); cursor: default; opacity: 1; }

  .players-panel {
    grid-area: players;
    border-right: 1px solid var(--border);
    background: var(--bg-card);
    overflow-y: auto;
    padding: 16px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }

  .panel-label {
    font-family: 'Cinzel', serif;
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.25em; color: var(--text-dim);
    text-transform: uppercase;
    padding: 0 4px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .player-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    padding-right: 52px;
    background: var(--bg-raised);
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
    min-height: 64px;
  }

  .player-card.on-team {
    border-color: var(--gold-dim);
    box-shadow: 0 0 16px rgba(201,168,76,0.08);
  }

  .player-card .crown {
    display: none;
    position: absolute;
    top: 50%; right: 10px;
    transform: translateY(-50%);
    font-size: 30px; line-height: 1;
    color: var(--gold);
    text-shadow: 0 0 10px rgba(201,168,76,0.6), 0 0 24px rgba(201,168,76,0.3);
    animation: crown-pulse 2.5s ease-in-out infinite;
  }

  @keyframes crown-pulse {
    0%,100% { text-shadow: 0 0 10px rgba(201,168,76,0.6), 0 0 24px rgba(201,168,76,0.3); }
    50%      { text-shadow: 0 0 16px rgba(201,168,76,0.9), 0 0 36px rgba(201,168,76,0.5); }
  }

  .player-card.is-leader .crown { display: block; }

  .player-card .vote-mark {
    display: none;
    position: absolute; bottom: 8px; right: 12px;
    font-size: 18px; font-weight: 700; line-height: 1;
  }

  .player-card.voted-approve .vote-mark { display: block; color: var(--good); }
  .player-card.voted-reject  .vote-mark { display: block; color: var(--evil); }

  .player-name { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600; color: var(--text-pri); margin-bottom: 6px; }
  .player-badges { display: flex; gap: 4px; flex-wrap: wrap; }

  .badge { font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 2px 6px; border-radius: 2px; letter-spacing: 0.08em; font-weight: 500; }
  .badge-good   { background: var(--good-dim);   color: var(--good);   border: 1px solid var(--good); }
  .badge-evil   { background: var(--evil-dim);   color: var(--evil);   border: 1px solid var(--evil); }
  .badge-merlin { background: var(--merlin-dim); color: var(--merlin); border: 1px solid var(--merlin); }
  .badge-team   { background: rgba(201,168,76,0.1); color: var(--gold); border: 1px solid var(--gold-dim); }
  .badge-role   { background: var(--bg-deep); color: var(--text-sec); border: 1px solid var(--border); }

  .feed-panel { grid-area: feed; display: flex; flex-direction: column; overflow: hidden; }

  .feed-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
    display: flex; align-items: center; justify-content: space-between;
  }

  .phase-label { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; letter-spacing: 0.15em; color: var(--gold); text-transform: uppercase; }

  .feed-scroll {
    flex: 1; overflow-y: auto;
    padding: 16px 20px;
    display: flex; flex-direction: column; gap: 6px;
    scroll-behavior: smooth;
  }

  .feed-scroll::-webkit-scrollbar { width: 4px; }
  .feed-scroll::-webkit-scrollbar-track { background: transparent; }
  .feed-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .event { animation: slide-in 0.25s ease-out; border-radius: 4px; padding: 8px 12px; font-size: 15px; line-height: 1.5; }
  @keyframes slide-in { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

  .event-statement { background: var(--bg-raised); border-left: 2px solid var(--border-lit); }
  .event-statement.evil-player   { border-left-color: var(--evil);   background: rgba(140,58,58,0.05); }
  .event-statement.merlin-player { border-left-color: var(--merlin); background: rgba(90,110,176,0.05); }

  .event-speaker { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--text-sec); margin-bottom: 3px; text-transform: uppercase; }
  .event-speaker.evil   { color: var(--evil); }
  .event-speaker.merlin { color: var(--merlin); }
  .event-speaker.good   { color: var(--good); }
  .event-text { color: var(--text-pri); font-style: italic; }

  .event-system { display: flex; align-items: center; gap: 8px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 4px 0; }
  .event-system::before, .event-system::after { content:''; flex:1; height:1px; background:var(--border); }

  .event-vote { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 2px 0; }
  .vote-name { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; min-width: 80px; }
  .vote-result { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 2px; }
  .vote-approve { background: var(--good-dim); color: var(--good); border: 1px solid var(--good); }
  .vote-reject  { background: var(--evil-dim); color: var(--evil); border: 1px solid var(--evil); }

  .event-quest-result { border-radius: 4px; padding: 10px 14px; text-align: center; font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; letter-spacing: 0.1em; }
  .event-quest-result.pass { background: var(--good-dim); border: 1px solid var(--good); color: var(--good); }
  .event-quest-result.fail { background: var(--evil-dim); border: 1px solid var(--evil); color: var(--evil); }

  .event-proposal { background: rgba(201,168,76,0.06); border: 1px solid var(--gold-dim); border-radius: 4px; padding: 8px 12px; font-size: 13px; }
  .proposal-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.15em; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 4px; }
  .proposal-team  { color: var(--gold); font-weight: 600; }

  .event-game-over { border-radius: 6px; padding: 16px; text-align: center; font-family: 'Cinzel', serif; margin-top: 8px; }
  .event-game-over.good-wins { background: var(--good-dim); border: 1px solid var(--good); color: var(--good); }
  .event-game-over.evil-wins { background: var(--evil-dim); border: 1px solid var(--evil); color: var(--evil); }
  .game-over-title { font-size: 18px; font-weight: 700; letter-spacing: 0.15em; margin-bottom: 6px; }
  .game-over-sub   { font-size: 12px; opacity: 0.8; letter-spacing: 0.1em; }

  .reasoning-panel { grid-area: reasoning; border-left: 1px solid var(--border); background: var(--bg-card); display: flex; flex-direction: column; overflow: hidden; }

  .reasoning-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-family: 'Cinzel', serif; font-size: 9px; font-weight: 600; letter-spacing: 0.25em; color: var(--text-dim); text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; }
  .reasoning-round-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--gold-dim); letter-spacing: 0.1em; }

  .reasoning-scroll { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .reasoning-scroll::-webkit-scrollbar { width: 4px; }
  .reasoning-scroll::-webkit-scrollbar-track { background: transparent; }
  .reasoning-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .reasoning-entry { border: 1px solid var(--evil-dim); border-radius: 4px; background: rgba(140,58,58,0.04); animation: slide-in 0.25s ease-out; }
  .reasoning-entry-header { padding: 8px 10px; border-bottom: 1px solid var(--evil-dim); display: flex; align-items: center; justify-content: space-between; }
  .reasoning-agent { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; color: var(--evil); letter-spacing: 0.1em; }
  .reasoning-type  { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 0.1em; }

  .reasoning-body { padding: 12px; font-size: 14px; line-height: 1.7; color: var(--text-pri); font-family: 'Crimson Text', serif; cursor: pointer; }
  .reasoning-body.collapsed { max-height: 72px; overflow: hidden; -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%); mask-image: linear-gradient(to bottom, black 40%, transparent 100%); }

  .reasoning-expand { padding: 4px 10px 8px; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); cursor: pointer; text-align: center; letter-spacing: 0.1em; border-top: 1px solid var(--evil-dim); }
  .reasoning-expand:hover { color: var(--evil); }

  .assassination-entry { border-color: var(--gold-dim); background: rgba(201,168,76,0.03); }
  .assassination-entry .reasoning-entry-header { border-color: var(--gold-dim); }
  .assassination-entry .reasoning-agent { color: var(--gold); }
  .assassination-entry .reasoning-expand { border-color: var(--gold-dim); }

  .waiting { display:flex; align-items:center; justify-content:center; height:100%; flex-direction:column; gap:16px; }
  .waiting-title { font-family:'Cinzel',serif; font-size:14px; letter-spacing:0.2em; color:var(--gold-dim); text-transform:uppercase; }
  .waiting-sub   { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; color:var(--text-dim); }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div style="display:flex;align-items:center;gap:24px">
      <div class="title">Avalon <span>GOD VIEW</span></div>
      <div class="score-display">
        <span class="score-good" id="score-good">Good: 0</span>
        <span class="score-sep">·</span>
        <span class="score-evil" id="score-evil">Evil: 0</span>
      </div>
    </div>
    <div class="quest-track">
      <div class="quest-pip" id="q1">I</div>
      <div class="quest-pip" id="q2">II</div>
      <div class="quest-pip" id="q3">III</div>
      <div class="quest-pip" id="q4">IV</div>
      <div class="quest-pip" id="q5">V</div>
    </div>
    <div class="status-badge" id="status-badge">WAITING</div>
  </header>

  <aside class="players-panel" id="players-panel">
    <div class="panel-label">Players</div>
    <div class="waiting">
      <div class="waiting-title">Awaiting Game</div>
      <div class="waiting-sub">POST /game/start</div>
    </div>
  </aside>

  <main class="feed-panel">
    <div class="feed-header">
      <div class="phase-label" id="phase-label">—</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim)" id="round-label"></div>
    </div>
    <div class="feed-scroll" id="feed"></div>
  </main>

  <aside class="reasoning-panel">
    <div class="reasoning-header">
      <span>Agent Reasoning</span>
      <span class="reasoning-round-label" id="reasoning-round-label"></span>
    </div>
    <div class="reasoning-scroll" id="reasoning-scroll">
      <div class="waiting-placeholder" style="padding:20px;text-align:center;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em">
        EVIL AGENT REASONING<br>WILL APPEAR HERE
      </div>
    </div>
  </aside>

  <div class="continue-bar">
    <button class="continue-btn" id="continue-btn" onclick="continueGame()" disabled>WAITING…</button>
  </div>
</div>

<script>
// --- State ---
let players = {};
let currentRound = 0;
let goodScore = 0;
let evilScore = 0;
let currentTeam = [];
let currentLeader = null;
let pendingVotes = {};
let questCount = 0;
let voteBlock = null;

// --- Continue button ---
async function continueGame() {
  const btn = document.getElementById('continue-btn');
  btn.disabled = true;
  btn.textContent = 'CONTINUING…';
  try {
    await fetch('http://localhost:8000/game/continue', { method: 'POST' });
  } catch(e) {
    console.error('Continue failed', e);
  }
}

document.addEventListener('keydown', (e) => {
  if ((e.code === 'Space' || e.code === 'Enter') && !e.target.matches('input,textarea')) {
    e.preventDefault();
    const btn = document.getElementById('continue-btn');
    if (!btn.disabled) continueGame();
  }
});

// --- WebSocket ---
function connect() {
  const ws = new WebSocket('ws://localhost:8000/ws');

  ws.onopen = () => {
    document.getElementById('status-badge').textContent = 'CONNECTED';
    document.getElementById('status-badge').classList.add('live');
  };

  ws.onclose = () => {
    document.getElementById('status-badge').textContent = 'DISCONNECTED';
    document.getElementById('status-badge').classList.remove('live');
    setTimeout(connect, 2000);
  };

  ws.onmessage = (e) => {
    const event = JSON.parse(e.data);
    processEvent(event);
  };
}

// --- Event processors ---
function processEvent(event) {
  const { type, payload } = event;
  switch(type) {
    case 'game_started':            onGameStarted(payload); break;
    case 'discussion_started':      onDiscussionStarted(payload); break;
    case 'player_statement':        onPlayerStatement(payload); break;
    case 'player_passed':           break;
    case 'team_proposed':           onTeamProposed(payload); break;
    case 'vote_cast':               onVoteCast(payload); break;
    case 'quest_started':           onQuestStarted(payload); break;
    case 'quest_card_played':       break;
    case 'quest_result':            onQuestResult(payload); break;
    case 'evil_reasoning':          onEvilReasoning(payload); break;
    case 'assassination_started':   onAssassinationStarted(payload); break;
    case 'assassination_reasoning': onAssassinationReasoning(payload); break;
    case 'assassination_target':    onAssassinationTarget(payload); break;
    case 'game_over':               onGameOver(payload); break;
  }
}

function onGameStarted(payload) {
  players = {};
  goodScore = 0; evilScore = 0;
  currentTeam = []; pendingVotes = {};
  questCount = 0; voteBlock = null;

  payload.players.forEach(p => { players[p.name] = p; });

  renderPlayers();
  clearFeed();
  clearReasoning();
  resetQuestTrack();

  document.getElementById('score-good').textContent = 'Good: 0';
  document.getElementById('score-evil').textContent = 'Evil: 0';
  document.getElementById('phase-label').textContent = 'GAME STARTED';
  document.getElementById('round-label').textContent = '';
  setBtn(false, 'WAITING…');

  addSystemEvent(`Game begins — ${payload.players.length} players`);
}

function onDiscussionStarted(payload) {
  currentRound = payload.round;
  pendingVotes = {};
  voteBlock = null;
  document.getElementById('phase-label').textContent = 'DISCUSSION';
  document.getElementById('round-label').textContent = `Quest ${payload.round}`;
  addSystemEvent(`Discussion — Quest ${payload.round}`);
  clearReasoning(payload.round);
  renderPlayers();
}

function onPlayerStatement(payload) {
  const player = players[payload.player];
  const roleClass = player ? (player.is_merlin ? 'merlin' : player.is_evil ? 'evil' : 'good') : 'good';
  addStatement(payload.player, payload.statement, roleClass);
}

function onTeamProposed(payload) {
  currentTeam = payload.proposed_team;
  currentLeader = payload.leader;
  pendingVotes = {};
  voteBlock = null;
  document.getElementById('phase-label').textContent = 'VOTING';

  const el = document.createElement('div');
  el.className = 'event event-proposal';
  el.innerHTML = `
    <div class="proposal-label">Team Proposed by ${payload.leader}</div>
    <div class="proposal-team">${payload.proposed_team.join(' · ')}</div>
  `;
  feed().appendChild(el);
  scrollFeed();
  renderPlayers();
}

function onVoteCast(payload) {
  pendingVotes[payload.player] = payload.approved;
  renderPlayers();

  const player = players[payload.player];
  const roleClass = player ? (player.is_merlin ? 'merlin' : player.is_evil ? 'evil' : 'good') : 'good';

  const container = getOrCreateVoteBlock();
  const el = document.createElement('div');
  el.className = 'event-vote';
  el.innerHTML = `
    <span class="vote-name" style="color:var(--${roleClass})">${payload.player}</span>
    <span class="vote-result ${payload.approved ? 'vote-approve' : 'vote-reject'}">${payload.approved ? 'APPROVE' : 'REJECT'}</span>
  `;
  container.appendChild(el);
  scrollFeed();
}

function getOrCreateVoteBlock() {
  if (!voteBlock) {
    const wrapper = document.createElement('div');
    wrapper.className = 'event';
    wrapper.style.background = 'var(--bg-raised)';
    wrapper.style.padding = '8px 12px';
    wrapper.style.borderRadius = '4px';
    feed().appendChild(wrapper);
    voteBlock = wrapper;
  }
  return voteBlock;
}

function onQuestStarted(payload) {
  currentTeam = payload.team;
  voteBlock = null;
  document.getElementById('phase-label').textContent = 'QUEST';
  addSystemEvent(`Quest underway — Team: ${payload.team.join(', ')}`);
  document.querySelectorAll('.quest-pip').forEach(p => p.classList.remove('active'));
  const pip = document.getElementById('q' + payload.round);
  if (pip) pip.classList.add('active');
  renderPlayers();
}

function onQuestResult(payload) {
  questCount++;
  const pip = document.getElementById('q' + questCount);
  if (pip) {
    pip.classList.remove('active');
    pip.classList.add(payload.passed ? 'pass' : 'fail');
    pip.textContent = payload.passed ? '✓' : '✗';
  }

  goodScore = payload.good_score;
  evilScore = payload.evil_score;
  document.getElementById('score-good').textContent = `Good: ${payload.good_score}`;
  document.getElementById('score-evil').textContent = `Evil: ${payload.evil_score}`;

  const el = document.createElement('div');
  el.className = `event event-quest-result ${payload.passed ? 'pass' : 'fail'}`;
  el.innerHTML = payload.passed
    ? `Quest ${questCount} — SUCCESS`
    : `Quest ${questCount} — FAILED (${payload.fail_count} fail card${payload.fail_count !== 1 ? 's' : ''})`;
  feed().appendChild(el);
  scrollFeed();

  currentTeam = [];
  renderPlayers();

  // Enable continue button — backend is waiting
  setBtn(true, 'CONTINUE →');
}

function onEvilReasoning(payload) {
  addReasoningEntry(payload.player, payload.reasoning, 'quest');
}

function onAssassinationStarted(payload) {
  document.getElementById('phase-label').textContent = 'ASSASSINATION';
  document.getElementById('round-label').textContent = '';
  addSystemEvent(`${payload.assassin} prepares to name Merlin`);
}

function onAssassinationReasoning(payload) {
  addReasoningEntry(payload.player, payload.reasoning, 'assassination');
}

function onAssassinationTarget(payload) {
  const el = document.createElement('div');
  el.className = 'event event-proposal';
  el.innerHTML = `
    <div class="proposal-label" style="color:var(--evil)">Assassination</div>
    <div class="proposal-team" style="color:var(--evil)">${payload.assassin} names <strong>${payload.target}</strong> as Merlin</div>
  `;
  feed().appendChild(el);
  scrollFeed();
}

function onGameOver(payload) {
  const isGoodWin = payload.result === 'good_wins';
  document.getElementById('phase-label').textContent = 'GAME OVER';

  const el = document.createElement('div');
  el.className = `event event-game-over ${isGoodWin ? 'good-wins' : 'evil-wins'}`;
  el.innerHTML = `
    <div class="game-over-title">${isGoodWin ? '⚔ GOOD PREVAILS' : '☠ EVIL TRIUMPHS'}</div>
    <div class="game-over-sub">Merlin was ${payload.merlin}</div>
  `;
  feed().appendChild(el);
  scrollFeed();

  document.getElementById('status-badge').textContent = 'COMPLETE';
  document.getElementById('status-badge').classList.remove('live');
  setBtn(false, 'GAME OVER');
}

// --- Helpers ---
function setBtn(enabled, text) {
  const btn = document.getElementById('continue-btn');
  btn.disabled = !enabled;
  btn.textContent = text;
}

function renderPlayers() {
  const panel = document.getElementById('players-panel');
  panel.innerHTML = '<div class="panel-label">Players</div>';

  Object.values(players).forEach(p => {
    const isLeader = p.name === currentLeader;
    const onTeam = currentTeam.includes(p.name);
    const vote = pendingVotes[p.name];

    const card = document.createElement('div');
    card.className = [
      'player-card',
      isLeader ? 'is-leader' : '',
      onTeam ? 'on-team' : '',
      vote === true  ? 'voted-approve' : '',
      vote === false ? 'voted-reject'  : '',
    ].filter(Boolean).join(' ');

    const roleClass = p.is_merlin ? 'merlin' : p.is_evil ? 'evil' : 'good';
    const roleLabel = p.role.replace(/_/g, ' ').toUpperCase();

    card.innerHTML = `
      <span class="crown">♔</span>
      <div class="player-name" style="color:var(--${roleClass === 'good' ? 'text-pri' : roleClass})">${p.name}</div>
      <div class="player-badges">
        <span class="badge badge-${roleClass}">${roleClass.toUpperCase()}</span>
        <span class="badge badge-role">${roleLabel}</span>
        ${onTeam ? '<span class="badge badge-team">ON QUEST</span>' : ''}
      </div>
      <span class="vote-mark">${vote === true ? '✓' : vote === false ? '✗' : ''}</span>
    `;
    panel.appendChild(card);
  });
}

function addStatement(name, text, roleClass) {
  const el = document.createElement('div');
  el.className = `event event-statement ${roleClass === 'evil' ? 'evil-player' : roleClass === 'merlin' ? 'merlin-player' : ''}`;
  el.innerHTML = `
    <div class="event-speaker ${roleClass}">${name}</div>
    <div class="event-text">"${text}"</div>
  `;
  feed().appendChild(el);
  scrollFeed();
}

function addSystemEvent(text) {
  const el = document.createElement('div');
  el.className = 'event event-system';
  el.textContent = text;
  feed().appendChild(el);
  scrollFeed();
}

function addReasoningEntry(agent, reasoning, type) {
  const scroll = document.getElementById('reasoning-scroll');
  const placeholder = scroll.querySelector('.waiting-placeholder');
  if (placeholder) placeholder.remove();

  const entry = document.createElement('div');
  entry.className = `reasoning-entry ${type === 'assassination' ? 'assassination-entry' : ''}`;
  const typeLabel = type === 'assassination' ? 'ASSASSINATION' : 'QUEST VOTE';

  entry.innerHTML = `
    <div class="reasoning-entry-header">
      <span class="reasoning-agent">${agent}</span>
      <span class="reasoning-type">${typeLabel}</span>
    </div>
    <div class="reasoning-body collapsed">${reasoning.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>
    <div class="reasoning-expand">▾ expand</div>
  `;

  const body = entry.querySelector('.reasoning-body');
  const expand = entry.querySelector('.reasoning-expand');
  expand.addEventListener('click', () => {
    body.classList.toggle('collapsed');
    expand.textContent = body.classList.contains('collapsed') ? '▾ expand' : '▴ collapse';
  });

  scroll.appendChild(entry);
  scroll.scrollTop = scroll.scrollHeight;
}

function feed() { return document.getElementById('feed'); }
function scrollFeed() { const f = feed(); f.scrollTop = f.scrollHeight; }
function clearFeed() { feed().innerHTML = ''; }

function clearReasoning(round) {
  document.getElementById('reasoning-scroll').innerHTML = `
    <div class="waiting-placeholder" style="padding:20px;text-align:center;color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em">
      EVIL AGENT REASONING<br>WILL APPEAR HERE
    </div>
  `;
  document.getElementById('reasoning-round-label').textContent = round ? `QUEST ${round}` : '';
}

function resetQuestTrack() {
  questCount = 0;
  ['I','II','III','IV','V'].forEach((label, i) => {
    const pip = document.getElementById('q' + (i+1));
    pip.className = 'quest-pip';
    pip.textContent = label;
  });
}

connect();
</script>
</body>
</html>
